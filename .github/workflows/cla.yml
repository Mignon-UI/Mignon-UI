name: "Contributor License Agreement"

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize, reopened]

# Prevent concurrent runs on the same pull request
concurrency:
  group: clacheck-${{ github.event.number }}
  cancel-in-progress: true

jobs:
  cla-check:
    runs-on: ubuntu-latest
    steps:
      - name: "CLA Assistant Lite"
        if: (github.event.comment.body == 'I agree to the CLA' || github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.action == 'reopened')
        uses: contributor-assistant/github-action@v2.4.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # To store signatures in a private Gist, create a Personal Access Token (PAT) 
          # with 'gist' scope, and add it to your repo secrets as PERSONAL_ACCESS_TOKEN.
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          # Link to your CLA document in the repository
          path-to-document: 'https://github.com/${{ github.repository }}/blob/main/Contributor%20License%20Agreement'
          
          # Path to store the signatures JSON file inside the remote repo
          path-to-signatures: 'cla.json'
          
          # The branch in your signatures repository (usually main)
          branch: 'main'
          
          # The private signatures repository details
          remote-organization-name: 'Mignon-UI'
          remote-repository-name: 'Mignon-CLA'
          
          # Skip bot accounts
          allowlist: 'Mignon-UI-dev,dependabot[bot],greenkeeper[bot],github-actions[bot]'
          
          # The custom message the bot posts on the Pull Request when signatures are missing
          custom-notsigned-prcomment: |
            👋 Thank you for your contribution!
            
            Before we can merge your pull request, you must review and agree to our [Contributor License Agreement](https://github.com/${{ github.repository }}/blob/main/Contributor%20License%20Agreement).
            
            If you agree to the terms, please reply to this comment with the exact phrase:
            **`I agree to the CLA`**
            
          # The exact comment phrase the bot looks for to register a signature
          custom-pr-sign-comment: 'I agree to the CLA'
